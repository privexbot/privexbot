# SecretVM Production Deployment with Traefik
# Usage: Upload this file to /mnt/secure/docker_wd/ as docker-compose.yml
# Then: docker compose up -d
#
# Network: privexbot.com (67.43.239.18)
# Public Subdomains:
#   - api.privexbot.com      (Backend API)
#   - pgadmin.privexbot.com  (PgAdmin)
#   - flower.privexbot.com   (Celery Flower Monitoring)
#
# Admin UIs (SSH tunnel access only - not publicly exposed):
#   - Redis UI: ssh -L 8081:privexbot-redis-ui-secretvm:8081 user@67.43.239.18
#   - Traefik:  ssh -L 8080:traefik-secretvm:8080 user@67.43.239.18
#
# IMPORTANT: Update image digest after building and pushing with:
#   ./scripts/docker/build-push-cpu.sh 0.1.0
#   Then replace sha256:fcc7eb8cadd2cc92697074b5291824c8d2754ef1eb296e1701a689056f7655d8 with the output digest
services:
  backend:
    # REPLACE THIS: Use digest from build-push-cpu.sh output
    image: privexbot/privexbot-backend@sha256:4093b08b12e6ef4e4e740f15410b799f3b77de06cd374ce10a476d3cfd229552
    container_name: privexbot-backend-secretvm
    env_file:
      - usr/.env
    environment:
      # Playwright configuration for production
      - PLAYWRIGHT_BROWSERS_PATH=/app/cache/ms-playwright
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      # Tika for document parsing
      - TIKA_URL=http://tika:9998
      # MinIO object storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_URL=https://storage.privexbot.com
      # HuggingFace cache for embedding models
      - HF_HOME=/app/cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      tika:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Persist Playwright browsers for web scraping
      - playwright_browsers:/app/cache/ms-playwright
      # Persist HuggingFace embedding models (avoids ~470MB re-download)
      - huggingface_cache:/app/cache/huggingface
    networks:
      - traefik
    # CRITICAL: DNS configuration for reliable email sending
    dns:
      - 8.8.8.8 # Google DNS
      - 8.8.4.4 # Google DNS backup
      - 1.1.1.1 # Cloudflare DNS
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 720s
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.privexbot.com`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.services.api.loadbalancer.server.port=8000
      - traefik.docker.network=traefik

  # Celery worker for background tasks (KB processing, embeddings, crawling)
  celery-worker:
    # REPLACE THIS: Use same digest from build-push-cpu.sh output
    image: privexbot/privexbot-backend@sha256:4093b08b12e6ef4e4e740f15410b799f3b77de06cd374ce10a476d3cfd229552
    container_name: privexbot-celery-secretvm
    working_dir: /app/src
    env_file:
      - usr/.env
    environment:
      # PyTorch/OpenMP compatibility with Celery
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - VECLIB_MAXIMUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
      # Playwright configuration for production
      - PLAYWRIGHT_BROWSERS_PATH=/app/cache/ms-playwright
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      # Tika for document parsing
      - TIKA_URL=http://tika:9998
      # MinIO object storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_URL=https://storage.privexbot.com
      # HuggingFace cache for embedding models
      - HF_HOME=/app/cache/huggingface
      # Ensure Celery can connect to Redis
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # Critical: Python path for task discovery
      - PYTHONPATH=/app/src
      - C_FORCE_ROOT=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      tika:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: celery -A app.tasks.celery_worker worker --loglevel=info --queues=default,high_priority,low_priority --concurrency=2
    volumes:
      # Persist Playwright browsers for web scraping (Celery tasks need browsers too)
      - playwright_browsers:/app/cache/ms-playwright
      # Persist HuggingFace embedding models (shared with backend)
      - huggingface_cache:/app/cache/huggingface
    networks:
      - traefik
    # CRITICAL: DNS configuration for reliable email sending in background tasks
    dns:
      - 8.8.8.8 # Google DNS
      - 8.8.4.4 # Google DNS backup
      - 1.1.1.1 # Cloudflare DNS
    restart: unless-stopped

  # Celery beat for scheduled tasks (periodic re-indexing, maintenance)
  celery-beat:
    # REPLACE THIS: Use same digest from build-push-cpu.sh output
    image: privexbot/privexbot-backend@sha256:4093b08b12e6ef4e4e740f15410b799f3b77de06cd374ce10a476d3cfd229552
    container_name: privexbot-celery-beat-secretvm
    working_dir: /app/src
    # Use exec to properly handle signals; pidfile in /tmp is ephemeral per container
    command: ["celery", "-A", "app.tasks.celery_worker", "beat", "--loglevel=info", "--pidfile=/tmp/celerybeat.pid", "--schedule=/tmp/celerybeat-schedule"]
    env_file:
      - usr/.env
    environment:
      # Database URL - CRITICAL: Task imports require database engine
      - DATABASE_URL=postgresql+psycopg2://privexbot:${POSTGRES_PASSWORD}@postgres:5432/privexbot
      # Redis URLs
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # Qdrant URL (for task imports)
      - QDRANT_URL=http://qdrant:6333
      # Python path for task discovery
      - PYTHONPATH=/app/src
    depends_on:
      # CRITICAL: Wait for backend to ensure migrations are complete
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - traefik
    restart: unless-stopped

  # Flower for Celery monitoring (Web UI at https://flower.privexbot.com)
  flower:
    # REPLACE THIS: Use same digest from build-push-cpu.sh output
    image: privexbot/privexbot-backend@sha256:4093b08b12e6ef4e4e740f15410b799f3b77de06cd374ce10a476d3cfd229552
    container_name: privexbot-flower-secretvm
    working_dir: /app/src
    command: celery -A app.tasks.celery_worker flower --port=5555 --basic_auth=admin:${FLOWER_PASSWORD}
    env_file:
      - usr/.env
    environment:
      # Ensure Celery can connect to Redis
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # Critical: Python path for task discovery
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - traefik
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.flower.rule=Host(`flower.privexbot.com`)
      - traefik.http.routers.flower.entrypoints=websecure
      - traefik.http.routers.flower.tls=true
      - traefik.http.services.flower.loadbalancer.server.port=5555
      - traefik.docker.network=traefik
  # MinIO object storage for file uploads (avatars, KB files, chat files)
  minio:
    image: minio/minio:latest
    container_name: privexbot-minio-secretvm
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-privexbot}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      # CORS for frontend access (required for avatar uploads, KB file previews)
      # NOT using wildcard (*) in production for security
      - MINIO_API_CORS_ALLOW_ORIGIN=https://privexbot.com,https://api.privexbot.com
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - traefik
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # S3 API: storage.privexbot.com
      - traefik.http.routers.minio-api.rule=Host(`storage.privexbot.com`)
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls=true
      - traefik.http.routers.minio-api.service=minio-api
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      # Console: minio.privexbot.com
      - traefik.http.routers.minio-console.rule=Host(`minio.privexbot.com`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls=true
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
      - traefik.docker.network=traefik
    env_file:
      - usr/.env

  # Apache Tika for document parsing (PDF, DOCX, CSV, etc.)
  tika:
    image: apache/tika:latest-full
    container_name: privexbot-tika-secretvm
    command: ["-noFork"]  # Run in no-fork mode for Docker (single process)
    environment:
      - OCR_STRATEGY=ocr_and_text  # Enable OCR for scanned documents
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      # Use GET request instead of HEAD (--spider) to avoid Tika INFO log noise
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:9998/tika || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: privexbot-qdrant-secretvm
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    env_file:
      - usr/.env

  postgres:
    image: pgvector/pgvector:pg16
    container_name: privexbot-postgres-secretvm
    environment:
      - POSTGRES_USER=privexbot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=privexbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U privexbot -d privexbot
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - usr/.env
  redis:
    image: redis:7-alpine
    container_name: privexbot-redis-secretvm
    volumes:
      - redis_data:/data
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 5
    env_file:
      - usr/.env
  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: privexbot-pgadmin-secretvm
    user: root
    environment:
      - PGADMIN_DEFAULT_EMAIL=privexbot@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_LISTEN_PORT=80
      - PGADMIN_CONFIG_PROXY_X_FOR_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_PROTO_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_HOST_COUNT=1
      - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -O
        - "-"
        - http://localhost:80/misc/ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.privexbot.com`)
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
      - traefik.docker.network=traefik
    env_file:
      - usr/.env
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: privexbot-redis-ui-secretvm
    environment:
      - REDIS_HOSTS=local:redis:6379
    env_file:
      - usr/.env
    depends_on:
      - redis
    networks:
      - traefik
    restart: unless-stopped
    # Removed: Traefik labels (no public access - use SSH tunnel)
    # Access via: ssh -L 8081:privexbot-redis-ui-secretvm:8081 user@67.43.239.18
    # Then open: http://localhost:8081

  traefik:
    image: traefik:v2.10
    container_name: traefik-secretvm
    command:
      - --api=true
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      # Extended timeouts for long-running KB operations (preview-chunks, finalize)
      - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=180s
      - --entrypoints.websecure.transport.respondingTimeouts.writeTimeout=180s
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/secure/cert:/certs:ro
    networks:
      - traefik
    restart: unless-stopped
    configs:
      - source: tls_config
        target: /etc/traefik/dynamic/tls.yml
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      # Removed: Dashboard routing (no public access - use SSH tunnel)
      # Access via: ssh -L 8080:traefik-secretvm:8080 user@67.43.239.18
      # Then open: http://localhost:8080/dashboard/
    env_file:
      - usr/.env
volumes:
  postgres_data: null
  redis_data: null
  pgadmin_data: null
  qdrant_data: null
  minio_data: null
  playwright_browsers: null  # Persistent Playwright browser cache
  huggingface_cache: null    # Persistent embedding model cache (~470MB)
networks:
  traefik:
    driver: bridge
configs:
  tls_config:
    content: |-
      tls:
        certificates:
          - certFile: /certs/secret_vm_fullchain.pem
            keyFile: /certs/secret_vm_private.pem
        stores:
          default:
            defaultCertificate:
              certFile: /certs/secret_vm_fullchain.pem
              keyFile: /certs/secret_vm_private.pem