# SecretVM Production Deployment with Inline Environment Variables
# This version has all environment variables inline to avoid .env file issues
# Usage: Upload this file to /mnt/secure/docker_wd/ as docker-compose.yml

services:
  backend:
    image: privexbot/privexbot-backend@sha256:39d802b13a729be644f95852572b6a7f4b9017f373bde5d74dd8c1169244afbf
    container_name: privexbot-backend-secretvm
    environment:
      # Application Settings
      - PROJECT_NAME=PrivexBot
      - API_V1_PREFIX=/api/v1
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://privexbot:Ebuka2025@postgres:5432/privexbot
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=sk-5CqWC1UoUPWvpyVpuMpcecgr_a8BO3NPqYBQC8I2bfwNS24htbDM1ffHl1vv4lMBmrMmgC6D
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - BACKEND_CORS_ORIGINS=https://privexbot.com,https://api.privexbot.com
      - NONCE_EXPIRE_SECONDS=300
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=privexbotapp@gmail.com
      - SMTP_PASSWORD=Ebuka@1234
      - SMTP_FROM_EMAIL=noreply@privexbot.com
      - SMTP_FROM_NAME=PrivexBot
      - FRONTEND_URL=https://privexbot.com/
      - DEBUG=false
      - LOG_LEVEL=INFO
      - PLAYWRIGHT_BROWSERS_PATH=/home/appuser/.cache/ms-playwright
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - playwright_browsers:/root/.cache/ms-playwright
    networks:
      - traefik
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    extra_hosts:
      - "smtp.gmail.com:142.250.80.109"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.privexbot.com`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.services.api.loadbalancer.server.port=8000
      - traefik.docker.network=traefik

  celery-worker:
    image: privexbot/privexbot-backend@sha256:39d802b13a729be644f95852572b6a7f4b9017f373bde5d74dd8c1169244afbf
    container_name: privexbot-celery-secretvm
    command: celery -A app.tasks.celery_worker worker --loglevel=info --queues=default,high_priority,low_priority --concurrency=2
    environment:
      - PROJECT_NAME=PrivexBot
      - API_V1_PREFIX=/api/v1
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://privexbot:Ebuka2025@postgres:5432/privexbot
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=sk-5CqWC1UoUPWvpyVpuMpcecgr_a8BO3NPqYBQC8I2bfwNS24htbDM1ffHl1vv4lMBmrMmgC6D
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - BACKEND_CORS_ORIGINS=https://privexbot.com,https://api.privexbot.com
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - VECLIB_MAXIMUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
      - PLAYWRIGHT_BROWSERS_PATH=/home/appuser/.cache/ms-playwright
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - playwright_browsers:/root/.cache/ms-playwright
    networks:
      - traefik
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    extra_hosts:
      - "smtp.gmail.com:142.250.80.109"
    restart: unless-stopped

  celery-beat:
    image: privexbot/privexbot-backend@sha256:39d802b13a729be644f95852572b6a7f4b9017f373bde5d74dd8c1169244afbf
    container_name: privexbot-celery-beat-secretvm
    command: celery -A app.tasks.celery_worker beat --loglevel=info
    environment:
      - PROJECT_NAME=PrivexBot
      - DATABASE_URL=postgresql://privexbot:Ebuka2025@postgres:5432/privexbot
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=sk-5CqWC1UoUPWvpyVpuMpcecgr_a8BO3NPqYBQC8I2bfwNS24htbDM1ffHl1vv4lMBmrMmgC6D
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - traefik
    restart: unless-stopped

  flower:
    image: privexbot/privexbot-backend@sha256:39d802b13a729be644f95852572b6a7f4b9017f373bde5d74dd8c1169244afbf
    container_name: privexbot-flower-secretvm
    command: celery -A app.tasks.celery_worker flower --port=5555 --basic_auth=admin:Ebuka2025
    environment:
      - PROJECT_NAME=PrivexBot
      - DATABASE_URL=postgresql://privexbot:Ebuka2025@postgres:5432/privexbot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FLOWER_PASSWORD=Ebuka2025
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - traefik
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.flower.rule=Host(`flower.privexbot.com`)
      - traefik.http.routers.flower.entrypoints=websecure
      - traefik.http.routers.flower.tls=true
      - traefik.http.services.flower.loadbalancer.server.port=5555
      - traefik.docker.network=traefik

  qdrant:
    image: qdrant/qdrant:latest
    container_name: privexbot-qdrant-secretvm
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: privexbot-postgres-secretvm
    environment:
      - POSTGRES_USER=privexbot
      - POSTGRES_PASSWORD=Ebuka2025
      - POSTGRES_DB=privexbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U privexbot -d privexbot
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: privexbot-redis-secretvm
    volumes:
      - redis_data:/data
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: privexbot-pgadmin-secretvm
    user: root
    environment:
      - PGADMIN_DEFAULT_EMAIL=privexbot@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=Ebuka2025
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_LISTEN_PORT=80
      - PGADMIN_CONFIG_PROXY_X_FOR_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_PROTO_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_HOST_COUNT=1
      - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - "-"
        - http://localhost:80/misc/ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.privexbot.com`)
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
      - traefik.docker.network=traefik

  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: privexbot-redis-ui-secretvm
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - traefik
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.redisui.rule=Host(`redis-ui.privexbot.com`)
      - traefik.http.routers.redisui.entrypoints=websecure
      - traefik.http.routers.redisui.tls=true
      - traefik.http.services.redisui.loadbalancer.server.port=8081
      - traefik.docker.network=traefik

  traefik:
    image: traefik:v2.10
    container_name: traefik-secretvm
    command:
      - --api=true
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/secure/cert:/certs:ro
    networks:
      - traefik
    restart: unless-stopped
    configs:
      - source: tls_config
        target: /etc/traefik/dynamic/tls.yml
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.privexbot.com`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.service=api@internal
      - traefik.docker.network=traefik

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  qdrant_data:
  playwright_browsers:

networks:
  traefik:
    driver: bridge

configs:
  tls_config:
    content: |-
      tls:
        certificates:
          - certFile: /certs/secret_vm_fullchain.pem
            keyFile: /certs/secret_vm_private.pem
        stores:
          default:
            defaultCertificate:
              certFile: /certs/secret_vm_fullchain.pem
              keyFile: /certs/secret_vm_private.pem