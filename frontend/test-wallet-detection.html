<!DOCTYPE html>
<html>
<head><title>Wallet Detection Test</title></head>
<body>
<h1>Wallet Detection Test</h1>
<script>
// Test what's actually available in window.ethereum
console.log('Testing wallet detection...');
console.log('window.ethereum exists:', !!window.ethereum);

if (window.ethereum) {
  console.log('ethereum.isMetaMask:', window.ethereum.isMetaMask);
  console.log('ethereum.isCoinbaseWallet:', window.ethereum.isCoinbaseWallet);
  console.log('ethereum.isRabby:', window.ethereum.isRabby);
  console.log('ethereum.isTrust:', window.ethereum.isTrust);
  console.log('ethereum.isZerion:', window.ethereum.isZerion);
  console.log('ethereum.isRainbow:', window.ethereum.isRainbow);
  console.log('ethereum.providers:', window.ethereum.providers);
  
  // Check for provider arrays (multi-wallet scenarios)
  if (window.ethereum.providers) {
    console.log('Multiple providers detected:', window.ethereum.providers.length);
    window.ethereum.providers.forEach((p, i) => {
      console.log(`Provider ${i}:`, Object.keys(p).filter(k => k.startsWith('is')));
    });
  }
}

console.log('window.solana exists:', !!window.solana);
console.log('window.keplr exists:', !!window.keplr);
console.log('window.phantom exists:', !!window.phantom);

// List all wallet-like properties
const walletProps = Object.keys(window).filter(k => 
  k.toLowerCase().includes('wallet') || 
  k.toLowerCase().includes('ethereum') ||
  k.toLowerCase().includes('solana') ||
  k.toLowerCase().includes('keplr')
);
console.log('Wallet-related window properties:', walletProps);
</script>
<pre id="output"></pre>
</body>
</html>
