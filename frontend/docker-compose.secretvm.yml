# SecretVM Production Deployment with Traefik
# Usage: Upload this file to /mnt/secure/docker_wd/frontend/ as docker-compose.yml
# Then: docker compose up -d
#
# Network: privexbot.com (67.43.239.18)
# Domain: privexbot.com (Frontend)
# API: api.privexbot.com (Backend)
#
# IMPORTANT: Update image digest after building and pushing with:
#   ./scripts/docker/build-push-secretvm.sh 1.0.0
#   Then replace the image reference below with the output digest

services:
  frontend:
    # REPLACE THIS: Use digest from build-push-secretvm.sh output
    image: privexbot/privexbot-frontend@sha256:04f6b3bdd19b7611adb604e57cdb73e6f0f7e94af974d1c9344a2f96d64e1ba8
    container_name: privexbot-frontend-secretvm
    restart: unless-stopped
    # Runtime config: docker-entrypoint.sh generates /config.js at startup
    # using env vars from usr/.env (API_BASE_URL, WIDGET_CDN_URL, ENVIRONMENT).
    # To change API URLs, update usr/.env and restart — no rebuild needed.
    networks:
      - traefik
    healthcheck:
      test:
        - CMD
        - wget
        - -O
        - "-"
        - http://localhost:80/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`privexbot.com`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls=true
      - traefik.http.services.app.loadbalancer.server.port=80
      - traefik.docker.network=traefik
    env_file:
      - usr/.env
  traefik:
    image: traefik:v2.10
    command:
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/secure/cert:/certs:ro
    networks:
      - traefik
    configs:
      - source: tls_config
        target: /etc/traefik/dynamic/tls.yml
    env_file:
      - usr/.env
networks:
  traefik:
    driver: bridge
configs:
  tls_config:
    content: |-
      tls:
        certificates:
          - certFile: /certs/secret_vm_fullchain.pem
            keyFile: /certs/secret_vm_private.pem
        stores:
          default:
            defaultCertificate:
              certFile: /certs/secret_vm_fullchain.pem
              keyFile: /certs/secret_vm_private.pem